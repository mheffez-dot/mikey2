<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPS Vendor Validator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    h1 {
      color: #1a1a2e;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    p.instructions {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 24px;
      text-align: left;
    }

    label {
      display: block;
      color: #374151;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 2px dashed #d1d5db;
      border-radius: 8px;
      background: #f9fafb;
      cursor: pointer;
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    input[type="file"]:hover {
      border-color: #667eea;
      background: #f3f4f6;
    }

    input[type="file"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    button {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 24px;
      }

      h1 {
        font-size: 20px;
      }

      p.instructions {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>CPS Vendor Validator</h1>
    <p class="instructions">Upload a CSV of vendor domains to start validation.</p>
    
    <form method="post" enctype="multipart/form-data" action="https://pvd.pei.mybluehost.me/form/9c8d7e6f-5a4b-4c3d-8e2f-1a0b9c8d7e6f">
      <div class="form-group">
        <label for="domains_csv">CSV File</label>
        <input type="file" id="domains_csv" name="domains_csv" accept=".csv" required>
      </div>
      
      <button type="submit">Start Validation</button>
    </form>
  </div>
</body>
</html>
